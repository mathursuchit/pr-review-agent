name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy agent/ api/ cache/ feedback/ eval/

      - name: Unit tests
        run: pytest tests/unit -q --tb=short

      - name: Dependency audit
        run: pip-audit

  evals:
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Only run evals when secrets are available (skipped on forks)
    if: github.event_name == 'push'
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_PROJECT: pr-review-agent-ci
      LANGSMITH_TRACING: "true"
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      API_KEY: ci-test-key
      REDIS_URL: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run evals
        run: python eval/run_evals.py --fail-below 0.80

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pr-review-agent:${{ github.sha }} .
